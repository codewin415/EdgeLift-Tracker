<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b0f26">
  <title>EdgeLift Tracker | Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="manifest" href="app.webmanifest">
  <link rel="stylesheet" href="styles.css?v=6">
</head>
<body>
  <div class="gridlines" aria-hidden="true"></div>
  <div class="noise" aria-hidden="true"></div>

  <main class="page-shell">
    <section class="reset-shell panel">
      <div class="panel-heading">
        <p class="eyebrow">Access Recovery</p>
        <h1 class="topbar-title">Reset Password</h1>
      </div>
      <p class="hero-copy">Enter a new password for your EdgeLift account. After the reset completes, head back into the tracker and sign in.</p>
      <form id="resetPasswordForm" class="goal-form">
        <label>
          New Password
          <input id="resetPasswordInput" type="password" minlength="6" placeholder="Minimum 6 characters" required>
        </label>
        <button type="submit" class="primary-btn">Update Password</button>
      </form>
      <p id="resetPasswordStatus" class="auth-status">Waiting for reset session...</p>
      <a class="primary-link" href="index.html">Back To Tracker</a>
    </section>
  </main>

  <script src="supabase-config.js"></script>
  <script type="module" src="reset-password.js"></script>
</body>
</html>
